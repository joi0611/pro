<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>赞顿学堂 | 中考英语专项训练</title>
  <style>
    :root {
      --page: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7fff0;
      --logo-green: #b6ff6f;
      --fresh-green: #d6ffad;
      --fresh-green-2: #ecffd9;
      --green-deep: #2d5f28;
      --ink: #050705;
      --muted: #667061;
      --line: #e4efd9;
      --shadow: 0 18px 48px rgba(31, 56, 28, 0.11);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(214, 255, 173, 0.38), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #ffffff 52%, #f9fff4 100%);
    }

    .page {
      width: min(1140px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 34px;
    }

    header {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #eef2ea;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
    }

    nav {
      display: flex;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    nav a {
      color: inherit;
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 8px;
    }

    nav a:hover {
      background: var(--fresh-green-2);
      color: var(--green-deep);
    }

    .hero {
      min-height: 430px;
      padding: 64px 0 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 56px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid #d7efc1;
      border-radius: 8px;
      color: var(--green-deep);
      background: var(--fresh-green-2);
      font-size: 14px;
      font-weight: 800;
    }

    .hero h1 {
      margin: 18px 0 0;
      font-size: clamp(46px, 7vw, 86px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hero p {
      margin: 22px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.85;
    }

    .hero-logo-panel {
      display: grid;
      place-items: center;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(214, 255, 173, 0.48), rgba(255, 255, 255, 0.92)),
        var(--surface);
      box-shadow: var(--shadow);
      aspect-ratio: 1 / 1;
    }

    .hero-logo-panel img {
      width: min(100%, 260px);
      height: auto;
      display: block;
    }

    .notice {
      margin-top: 26px;
      max-width: 620px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 30px rgba(31, 56, 28, 0.06);
    }

    .notice-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: var(--fresh-green);
      color: #111;
      font-weight: 900;
    }

    .notice strong {
      display: block;
      font-size: 17px;
      margin-bottom: 5px;
    }

    .notice span {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .training-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin-top: 10px;
    }

    .training-card {
      min-height: 264px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 12px 32px rgba(31, 56, 28, 0.07);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .training-card:hover {
      transform: translateY(-3px);
      border-color: #c7eba9;
      box-shadow: var(--shadow);
    }

    .card-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--fresh-green);
      color: #0d160b;
      font-size: 23px;
      font-weight: 900;
    }

    .training-card h2 {
      font-size: 22px;
      line-height: 1.35;
      margin: 18px 0 10px;
      letter-spacing: 0;
    }

    .training-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .enter-btn,
    .modal button {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 16px;
      font: inherit;
      cursor: pointer;
    }

    .enter-btn {
      width: 100%;
      margin-top: 24px;
      color: #0d160b;
      background: var(--fresh-green);
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(45, 95, 40, 0.1);
    }

    .enter-btn:hover,
    .modal .confirm:hover {
      background: var(--logo-green);
    }

    footer {
      margin-top: 34px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(5, 7, 5, 0.42);
      z-index: 20;
    }

    .modal-layer.active {
      display: flex;
    }

    .modal {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-weight: 800;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: #a9e879;
      box-shadow: 0 0 0 3px rgba(214, 255, 173, 0.72);
    }

    .error {
      min-height: 22px;
      margin: 8px 0 0;
      color: #b24536;
      font-size: 14px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modal .cancel {
      background: #f1f5ed;
      color: var(--green-deep);
      font-weight: 800;
    }

    .modal .confirm {
      background: var(--fresh-green);
      color: #0d160b;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 28px;
        padding-top: 42px;
      }

      .hero-logo-panel {
        max-width: 340px;
      }

      .training-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 580px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        padding-bottom: 12px;
      }

      nav {
        width: 100%;
      }

      nav a {
        padding-left: 0;
      }

      .hero {
        min-height: auto;
      }

      .hero-logo-panel {
        padding: 22px;
      }

      .training-grid {
        grid-template-columns: 1fr;
      }

      .training-card {
        min-height: 230px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <img class="brand-logo" src="assets/zaytun-logo.jpg" alt="赞顿学堂 LOGO" />
        <span>赞顿学堂</span>
      </div>
      <nav aria-label="主导航">
        <a href="#">首页</a>
        <a href="#training">专项训练</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <span class="eyebrow">中考英语专项训练平台</span>
          <h1>赞顿学堂</h1>
          <p>聚焦完形填空、语法填空、选词填空和读写题，帮助学生有节奏地完成题型突破。</p>
          <div class="notice">
            <div class="notice-mark">码</div>
            <div>
              <strong>进入训练需输入登录码</strong>
              <span>点击专项入口后，系统会弹出登录码窗口。验证通过即可进入对应训练页面。</span>
            </div>
          </div>
        </div>
        <div class="hero-logo-panel" aria-label="赞顿学堂品牌图">
          <img src="assets/zaytun-logo.jpg" alt="ZAYTUN LOGO" />
        </div>
      </section>

      <section id="training" class="training-grid" aria-label="专项训练入口">
        <article class="training-card">
          <div>
            <div class="card-icon">完</div>
            <h2>完形填空训练系统</h2>
            <p>训练语境理解、逻辑推理和词义辨析能力。</p>
          </div>
          <button class="enter-btn" data-target="training/cloze/index.html" data-title="完形填空训练系统">开始训练</button>
        </article>

        <article class="training-card">
          <div>
            <div class="card-icon">语</div>
            <h2>语法填空训练系统</h2>
            <p>强化动词、介词、连词、代词等语法考点。</p>
          </div>
          <button class="enter-btn" data-target="training/grammar/index.html" data-title="语法填空训练系统">开始训练</button>
        </article>

        <article class="training-card">
          <div>
            <div class="card-icon">词</div>
            <h2>选词填空训练系统</h2>
            <p>练习词汇辨析、词形变化和上下文匹配。</p>
          </div>
          <button class="enter-btn" data-target="training/word-choice/index.html" data-title="选词填空训练系统">开始训练</button>
        </article>

        <article class="training-card">
          <div>
            <div class="card-icon">读</div>
            <h2>读写题训练系统</h2>
            <p>提升信息提取、整合表达和书面作答能力。</p>
          </div>
          <button class="enter-btn" data-target="training/reading-writing/index.html" data-title="读写题训练系统">开始训练</button>
        </article>
      </section>
    </main>

    <footer>赞顿学堂 · 中考英语训练</footer>
  </div>

  <div class="modal-layer" id="codeModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h3 id="modalTitle">输入登录码</h3>
      <p id="modalDesc">请输入登录码后进入专项训练。</p>
      <label for="accessCode">登录码</label>
      <input id="accessCode" type="password" autocomplete="off" placeholder="请输入登录码" />
      <div class="error" id="errorText" aria-live="polite"></div>
      <div class="modal-actions">
        <button class="cancel" type="button" id="cancelBtn">取消</button>
        <button class="confirm" type="button" id="confirmBtn">进入</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.querySelector("#codeModal");
    const input = document.querySelector("#accessCode");
    const errorText = document.querySelector("#errorText");
    const modalDesc = document.querySelector("#modalDesc");
    const cancelBtn = document.querySelector("#cancelBtn");
    const confirmBtn = document.querySelector("#confirmBtn");
    let pendingTarget = "";

    function openCodeModal(title, target) {
      pendingTarget = target;
      modalDesc.textContent = `请输入登录码后进入：${title}`;
      errorText.textContent = "";
      input.value = "";
      modal.classList.add("active");
      setTimeout(() => input.focus(), 0);
    }

    function closeCodeModal() {
      modal.classList.remove("active");
      pendingTarget = "";
    }

    function verifyAndEnter() {
      window.location.href = pendingTarget;
    }

    document.querySelectorAll(".enter-btn").forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.target === "training/cloze/index.html" || button.dataset.target === "training/grammar/index.html" || button.dataset.target === "training/word-choice/index.html" || button.dataset.target === "training/reading-writing/index.html") {
          window.location.href = button.dataset.target;
          return;
        }
        openCodeModal(button.dataset.title, button.dataset.target);
      });
    });

    cancelBtn.addEventListener("click", closeCodeModal);
    confirmBtn.addEventListener("click", verifyAndEnter);

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        verifyAndEnter();
      }
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeCodeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("active")) {
        closeCodeModal();
      }
    });
  </script>
</body>
</html>
